<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD666" />
      <stop offset="1" stop-color="#D4AF37" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Subtle outline shape -->
  <g opacity="0.55">
    <path d="M90 110c40-40 120-72 210-72h200c90 0 170 32 210 72s60 104 60 170-20 130-60 170-120 72-210 72H300c-90 0-170-32-210-72s-60-104-60-170 20-130 60-170Z"
      stroke="url(#g)" stroke-width="2.5" opacity="0.25"/>
  </g>

  <text x="50%" y="48%" text-anchor="middle" dominant-baseline="middle"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
      font-size="48" font-weight="800" letter-spacing="0.02em"
      fill="url(#g)" filter="url(#glow)" opacity="0.95">Internet</text>
    <text x="50%" y="64%" text-anchor="middle" dominant-baseline="middle"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
      font-size="48" font-weight="800" letter-spacing="0.02em"
      fill="url(#g)" filter="url(#glow)" opacity="0.95">Download Manager</text>

  <text x="50%" y="84%" text-anchor="middle"
    font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
    font-size="14" letter-spacing="0.38em"
    fill="#E9E9EF" opacity="0.22">TECHSHOP PRO</text>
</svg>